# lefthook.yml
# Pre-commit and pre-push hook configuration for the Golf League monorepo.
#
# lefthook runs git hooks defined here. It is installed via pnpm in the mobile/
# directory — running `pnpm install` inside mobile/ will call `lefthook install`
# via the postinstall script, which registers these hooks in .git/hooks/.
#
# Manual setup (first time or after cloning):
#   cd mobile && pnpm install
#
# To bypass all hooks for a single commit (use sparingly):
#   LEFTHOOK=0 git commit -m "..."
#
# Documentation: https://github.com/evilmartians/lefthook

# ---------------------------------------------------------------------------
# Pre-commit: runs before the commit is recorded.
# Runs in PARALLEL — all commands start simultaneously for speed.
# ---------------------------------------------------------------------------
pre-commit:
  parallel: true

  commands:
    # -------------------------------------------------------------------------
    # Backend: Go linting (golangci-lint)
    # -------------------------------------------------------------------------
    # Runs multiple Go linters in parallel via golangci-lint.
    # Config: backend/.golangci.yml
    #
    # Requires golangci-lint to be installed globally (one-time per dev machine):
    #   go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
    # -------------------------------------------------------------------------
    backend-lint:
      glob: "backend/**/*.go"
      root: "backend"
      run: golangci-lint run ./...

    # -------------------------------------------------------------------------
    # Backend: Go test coverage ratchet
    # -------------------------------------------------------------------------
    # Blocks commits that would lower test coverage below the stored baseline.
    # The baseline is auto-updated when coverage improves.
    # See scripts/check-go-coverage.sh and .go-coverage-baseline for details.
    # -------------------------------------------------------------------------
    backend-coverage:
      glob: "backend/**/*.go"
      root: "backend"
      run: bash ../scripts/check-go-coverage.sh

    # -------------------------------------------------------------------------
    # Mobile: TypeScript type-checking
    # -------------------------------------------------------------------------
    # tsc --noEmit checks all TypeScript types without emitting any files.
    # This is faster than running ESLint because it only checks types, not style.
    # Catches: wrong prop types, missing required fields, null pointer dereferences.
    # -------------------------------------------------------------------------
    mobile-typecheck:
      glob: "mobile/**/*.{ts,tsx}"
      root: "mobile"
      # PATH prefix ensures Node.js is on the path in Git Bash on Windows.
      run: >
        export PATH="/c/Program Files/nodejs:/c/Users/trent/AppData/Roaming/npm:$PATH"
        && npx tsc --noEmit

    # -------------------------------------------------------------------------
    # Mobile: ESLint
    # -------------------------------------------------------------------------
    # Runs ESLint with eslint-config-expo (React Native rules) + react-native plugin.
    # Config: mobile/eslint.config.js
    # Catches: unused variables, unescaped entities, inline style violations,
    #          React hooks rule violations, and more.
    # -------------------------------------------------------------------------
    mobile-lint:
      glob: "mobile/**/*.{ts,tsx,js}"
      root: "mobile"
      run: >
        export PATH="/c/Program Files/nodejs:/c/Users/trent/AppData/Roaming/npm:$PATH"
        && npx expo lint

# ---------------------------------------------------------------------------
# Pre-push: runs before `git push` sends commits to the remote.
# Good place for slower checks (full test suites, coverage) that would be
# too slow on every commit.
# ---------------------------------------------------------------------------
pre-push:
  parallel: true

  commands:
    # -------------------------------------------------------------------------
    # Backend: full test suite on push
    # -------------------------------------------------------------------------
    # Run all backend tests (not just coverage) before pushing. This catches
    # test failures that might have slipped through (e.g., LEFTHOOK=0 commits).
    # -------------------------------------------------------------------------
    backend-tests:
      glob: "backend/**/*.go"
      root: "backend"
      run: go test ./... -timeout 60s

    # -------------------------------------------------------------------------
    # Backend: Docker build check
    # -------------------------------------------------------------------------
    # Verifies the Railway Dockerfile (repo root) builds successfully.
    # Catches Go version mismatches, missing files, and broken build steps
    # before they fail in Railway's CI. Uses --no-cache to avoid stale layers
    # masking a real failure.
    # -------------------------------------------------------------------------
    backend-docker-build:
      glob: "{backend/**/*.go,backend/go.mod,backend/go.sum,Dockerfile}"
      run: "if docker info > /dev/null 2>&1; then docker build --no-cache -t golf-league-backend-check:latest . && docker rmi golf-league-backend-check:latest; else echo 'Docker not running - skipping Docker build check'; fi"

    # Mobile Jest coverage will be added here once the Jest framework is set up.

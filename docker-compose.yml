services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: golf_league
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./mobile
      dockerfile: Dockerfile.web
      args:
        # Empty string so the JS bundle uses relative URLs (/api/v1/...) which
        # Caddy intercepts and proxies to the backend — never the backend's public URL.
        EXPO_PUBLIC_API_URL: ""
        EXPO_PUBLIC_SUPABASE_URL: ${EXPO_PUBLIC_SUPABASE_URL}
        EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
    environment:
      # PORT: the port Caddy listens on (Railway injects this automatically in production).
      PORT: "3000"
      # BACKEND_PRIVATE_URL: Caddy proxies /api/* here. Uses the docker-compose service
      # name so container-to-container traffic stays on the Docker bridge network.
      # In Railway, set this to the backend's private hostname instead.
      BACKEND_PRIVATE_URL: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:

# sonar-project.properties
# SonarCloud analysis configuration for the Golf League monorepo.
#
# SonarCloud (sonarcloud.io) is the cloud-hosted version of SonarQube.
# It provides deep static analysis, security hotspot detection, code smells,
# duplication detection, and a quality gate that can block PRs.
#
# HOW SONARCLOUD FITS IN THE QUALITY CHAIN:
#   1. Pre-commit (local):  ESLint + golangci-lint + tsc + coverage ratchet (lefthook)
#   2. CI (on push/PR):     SonarCloud Scanner → sonarcloud.io quality gate
#   3. IDE (real-time):     SonarLint VS Code extension (connected mode to this project)
#
# SETUP STEPS (one-time):
#   1. Go to sonarcloud.io and sign in with your GitHub account.
#   2. Create an organization (or use an existing one). Note the organization key.
#   3. Create a new project linked to this GitHub repo.
#   4. Replace the placeholder values below with your actual org and project keys.
#   5. Generate a SONAR_TOKEN in SonarCloud → Account → Security.
#   6. Add SONAR_TOKEN as a GitHub Actions secret (Settings → Secrets → Actions).
#
# SONAR LINT IDE SETUP:
#   1. Install the "SonarQube for IDE" extension in VS Code.
#   2. Open VS Code → Command Palette → "SonarLint: Connect to SonarCloud".
#   3. Enter your SONAR_TOKEN and select this project.
#   SonarLint will then use SonarCloud's rules locally, giving you real-time
#   feedback in the editor that matches what SonarCloud checks on CI.

# ---- Project identification ----
# Replace these with your actual SonarCloud organization and project key.
# The project key is visible on sonarcloud.io under your project's "Information" tab.
sonar.projectKey=trentd187_golf-league
sonar.organization=trentd187

# Human-readable name shown in the SonarCloud dashboard.
sonar.projectName=Golf Stuff In Here

# ---- Source paths ----
# Tell SonarCloud where the source code lives (relative to this file's directory).
# Comma-separated list — mobile and backend are analyzed together.
sonar.sources=mobile/app,mobile/components,mobile/hooks,mobile/stores,mobile/themes,mobile/utils,mobile/constants,backend/cmd,backend/internal

# ---- Test paths ----
# SonarCloud uses these to separate test code from production code in metrics.
sonar.tests=backend/internal/testutil,backend/internal/handlers

# ---- Exclusions ----
# Paths to skip entirely — generated files, migrations, and vendor code.
sonar.exclusions=\
  **/node_modules/**,\
  **/.expo/**,\
  **/dist/**,\
  backend/migrations/**,\
  mobile/android/**,\
  mobile/ios/**

# ---- Language-specific: TypeScript ----
sonar.javascript.lcov.reportPaths=mobile/coverage/lcov.info

# ---- Language-specific: Go ----
# Path to the Go coverage report (generated by go test -coverprofile).
# The CI workflow should generate this before running the SonarCloud scanner.
sonar.go.coverage.reportPaths=backend/coverage.out

# ---- Encoding ----
sonar.sourceEncoding=UTF-8

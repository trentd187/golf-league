# lefthook.yml
# Pre-commit and pre-push hook configuration for the Golf League monorepo.
#
# lefthook runs git hooks defined here. It is installed via pnpm in the mobile/
# directory — running `pnpm install` inside mobile/ will call `lefthook install`
# via the postinstall script, which registers these hooks in .git/hooks/.
#
# Manual setup (first time or after cloning):
#   cd mobile && pnpm install
#
# To bypass all hooks for a single commit (use sparingly):
#   LEFTHOOK=0 git commit -m "..."
#
# Documentation: https://github.com/evilmartians/lefthook

# ---------------------------------------------------------------------------
# Pre-commit: runs before the commit is recorded.
# All commands here run in PARALLEL by default for speed.
# ---------------------------------------------------------------------------
pre-commit:
  # Run all pre-commit commands in parallel where possible.
  parallel: true

  commands:
    # -------------------------------------------------------------------------
    # Backend: Go test coverage gate
    # -------------------------------------------------------------------------
    # Only triggers when .go source files are part of the commit, so pure
    # docs/config/mobile commits are not slowed down by running Go tests.
    #
    # This check enforces a 90% coverage threshold on the core backend packages
    # (handlers + middleware). See scripts/check-go-coverage.sh for details.
    # -------------------------------------------------------------------------
    backend-coverage:
      # glob: only run this command when Go files are staged for commit.
      # If you change only mobile or docs files, this command is skipped.
      glob: "backend/**/*.go"

      # root: run the command from the backend/ directory.
      # Relative paths in `run` are resolved from this directory.
      root: "backend"

      # Run the coverage script. "../scripts/" goes up one level from backend/
      # to the repo root where scripts/ lives.
      run: bash ../scripts/check-go-coverage.sh

    # -------------------------------------------------------------------------
    # Mobile: TypeScript type-checking (fast — no test runner needed)
    # -------------------------------------------------------------------------
    # tsc --noEmit checks types without producing output files.
    # This catches TypeScript errors before they reach the remote.
    #
    # NOTE: Jest mobile tests will be added here once the mobile test
    # framework is set up (currently only the backend has tests).
    # -------------------------------------------------------------------------
    mobile-typecheck:
      # Only run when TypeScript/TSX files in mobile/ are staged.
      glob: "mobile/**/*.{ts,tsx}"

      # Run from the mobile/ directory where tsconfig.json lives.
      root: "mobile"

      # npx tsc --noEmit: type-check without writing any output files.
      # The PATH prefix ensures Node.js is available in Git Bash on Windows.
      run: >
        export PATH="/c/Program Files/nodejs:/c/Users/trent/AppData/Roaming/npm:$PATH"
        && npx tsc --noEmit

# ---------------------------------------------------------------------------
# Pre-push: runs before `git push` sends commits to the remote.
# A good place for slower checks that are too heavy for every commit.
# (Currently empty — add mobile Jest coverage here once tests are written.)
# ---------------------------------------------------------------------------
pre-push:
  commands: {}

# sonar-project.properties
# SonarCloud analysis configuration for the Golf League monorepo.
#
# SonarCloud (sonarcloud.io) is the cloud-hosted version of SonarQube.
# It provides deep static analysis, security hotspot detection, code smells,
# duplication detection, and a quality gate that can block PRs.
#
# HOW SONARCLOUD FITS IN THE QUALITY CHAIN:
#   1. Pre-commit (local):  ESLint + golangci-lint + tsc + coverage ratchet (lefthook)
#   2. CI (on push/PR):     SonarCloud Scanner → sonarcloud.io quality gate
#   3. IDE (real-time):     SonarLint VS Code extension (connected mode to this project)
#
# SETUP STEPS (one-time):
#   1. Go to sonarcloud.io and sign in with your GitHub account.
#   2. Create an organization (or use an existing one). Note the organization key.
#   3. Create a new project linked to this GitHub repo.
#   4. Replace the placeholder values below with your actual org and project keys.
#   5. Generate a SONAR_TOKEN in SonarCloud → Account → Security.
#   6. Add SONAR_TOKEN as a GitHub Actions secret (Settings → Secrets → Actions).
#
# SONAR LINT IDE SETUP:
#   1. Install the "SonarQube for IDE" extension in VS Code.
#   2. Open VS Code → Command Palette → "SonarLint: Connect to SonarCloud".
#   3. Enter your SONAR_TOKEN and select this project.
#   SonarLint will then use SonarCloud's rules locally, giving you real-time
#   feedback in the editor that matches what SonarCloud checks on CI.

# ---- Project identification ----
# Replace these with your actual SonarCloud organization and project key.
# The project key is visible on sonarcloud.io under your project's "Information" tab.
sonar.projectKey=trentd187_golf-league
sonar.organization=trentd187

# Human-readable name shown in the SonarCloud dashboard.
sonar.projectName=Golf Stuff In Here

# ---- Source paths ----
# Tell SonarCloud where the source code lives (relative to this file's directory).
# Comma-separated list — mobile and backend are analyzed together.
sonar.sources=mobile/app,mobile/components,mobile/hooks,mobile/stores,mobile/themes,mobile/utils,mobile/constants,backend/cmd,backend/internal

# ---- Test paths ----
# For Go, test files (_test.go) live alongside source files in the same directory.
# SonarCloud's Go plugin detects _test.go files automatically — no separate test
# directory is needed. backend/internal/testutil holds shared test helpers, not tests.
# sonar.tests is intentionally omitted for Go.

# ---- Exclusions ----
# Paths to skip entirely — generated files, migrations, and vendor code.
sonar.exclusions=\
  **/node_modules/**,\
  **/.expo/**,\
  **/dist/**,\
  backend/migrations/**,\
  mobile/android/**,\
  mobile/ios/**

# ---- Coverage scope (aligned to the Jest/Go test scope) ----
# These files are intentionally NOT unit-tested, so they produce no coverage data
# and SonarCloud would otherwise count them as 0% — failing the "Coverage on New
# Code" gate on any PR that touches them. We exclude them from the COVERAGE metric
# only (they are still analysed for bugs, smells, and security).
#
# Mobile: mirrors jest `collectCoverageFrom` in mobile/package.json — coverage is
# collected from utils/** and app/** minus the large screen files (scorecard,
# events, rounds, courses, and the heavy (tabs) screens), which are covered by the
# future E2E suite, not Jest. components/hooks/stores/themes/constants are likewise
# outside collectCoverageFrom. Keep this list in sync with that jest config.
# Backend: mirrors the Tier 1/Tier 2 strategy — handlers, middleware, and services
# are unit-tested; entry point, config, db wiring, models, and the ws hub are not.
sonar.coverage.exclusions=\
  **/*_test.go,\
  **/*.test.ts,\
  **/*.test.tsx,\
  mobile/components/**,\
  mobile/hooks/**,\
  mobile/stores/**,\
  mobile/themes/**,\
  mobile/constants/**,\
  mobile/app/scorecard/**,\
  mobile/app/events/**,\
  mobile/app/rounds/**,\
  mobile/app/courses/**,\
  mobile/app/(tabs)/events.tsx,\
  mobile/app/(tabs)/rounds.tsx,\
  mobile/app/(tabs)/stats.tsx,\
  mobile/app/(tabs)/courses.tsx,\
  mobile/app/(tabs)/_layout.tsx,\
  mobile/app/_layout.tsx,\
  mobile/app/+not-found.tsx,\
  backend/cmd/**,\
  backend/internal/config/**,\
  backend/internal/database/**,\
  backend/internal/models/**,\
  backend/internal/websocket/**,\
  backend/internal/testutil/**

# ---- Duplication scope ----
# The large detail-screen files are JSX-heavy and carry repetitive layout markup;
# they are the same E2E-territory files excluded from coverage above. Exclude them
# from the duplication metric so "Duplicated Lines on New Code" reflects the
# unit-gated core (utils/components/services). Real duplication there is still
# flagged. Bugs/smells in the screens are still analysed.
sonar.cpd.exclusions=\
  **/*_test.go,\
  mobile/app/scorecard/**,\
  mobile/app/events/**,\
  mobile/app/rounds/**,\
  mobile/app/courses/**,\
  mobile/app/users/**

# ---- Language-specific: TypeScript ----
# Tell SonarCloud where the tsconfig.json lives so it can resolve TypeScript types.
# Without this, SonarCloud warns "referenced tsconfig not found" because it can't
# resolve "expo/tsconfig.base" without node_modules. The CI workflow must run
# `pnpm install` before the SonarCloud scanner so node_modules is available.
sonar.javascript.tsconfigPaths=mobile/tsconfig.json
# LCOV coverage report generated by Jest (mobile test coverage — requires Jest setup).
sonar.javascript.lcov.reportPaths=mobile/coverage/lcov.info

# ---- Language-specific: Go ----
# Path to the Go coverage report (generated by go test -coverprofile).
# The CI workflow should generate this before running the SonarCloud scanner.
sonar.go.coverage.reportPaths=backend/coverage.out

# ---- Quality gate enforcement ----
# Make the scanner BLOCK until SonarCloud finishes background processing, read the
# quality gate result, and exit non-zero if it fails. Without this the scanner only
# uploads the report and returns success immediately — the gate is then evaluated
# asynchronously and surfaced only by the SonarCloud GitHub app's PR check, so the
# local /ci Sonar step and the GH Actions sonarcloud job would BOTH go green on a
# red gate. With wait=true, a failing gate fails the scan (and thus CI) where you
# can see it before opening the PR.
sonar.qualitygate.wait=true

# ---- Encoding ----
sonar.sourceEncoding=UTF-8

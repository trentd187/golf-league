# mobile/nginx.conf
# nginx config for serving the Expo web static export as a SPA.
#
# Why try_files → index.html?
#   Expo Router generates client-side routes (e.g. /events/123). When the user
#   navigates directly to such a URL, nginx must serve index.html and let the
#   React app handle routing — otherwise nginx returns 404 for unknown paths.

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Lightweight health check for Railway — returns 200 with no body read.
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # All routes fall back to index.html for client-side (Expo Router) navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed JS/CSS assets aggressively — Expo's bundler content-hashes filenames.
    # index.html must NOT be cached so users always get the latest shell.
    location ~* \.(js|css|png|ico|woff2|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

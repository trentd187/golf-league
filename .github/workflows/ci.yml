# .github/workflows/ci.yml
# CI workflow: runs on every PR targeting main.
# Three jobs run in parallel (backend, mobile) then sonarcloud runs after both succeed.
# All three are required checks — configure branch protection in Settings → Branches.

name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  # ─── Backend: lint + test + coverage ──────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Run golangci-lint
        run: golangci-lint run ./...

      - name: Run tests with coverage
        run: go test ./... -coverprofile=coverage.out -timeout 120s

      - name: Enforce coverage ratchet
        working-directory: backend
        run: bash ../scripts/check-go-coverage.sh

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out

  # ─── Mobile: typecheck + lint + tests ─────────────────────────────────────────
  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: mobile/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      # Validates SDK peer deps, version alignment, and plugin config.
      # Fails the build if any of the 17 checks fail.
      - name: Expo Doctor
        run: npx expo-doctor

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx expo lint

      - name: Jest tests with coverage
        run: npx jest --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/

  # ─── SonarCloud: static analysis ──────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [backend, mobile]

    steps:
      - uses: actions/checkout@v4
        with:
          # SonarCloud requires full git history for blame information and new-code detection.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: mobile/pnpm-lock.yaml

      # node_modules must exist so the scanner can resolve "expo/tsconfig.base"
      # referenced in mobile/tsconfig.json's "extends" field.
      - name: Install mobile dependencies
        working-directory: mobile
        run: pnpm install --frozen-lockfile

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend/

      - name: Download mobile coverage
        uses: actions/download-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
